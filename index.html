<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Telegrall — быстрый и безопасный мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0e1621;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            background: #17212b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Аутентификация */
        .auth-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0e1621;
            padding: 16px;
        }
        .auth-card {
            background: #17212b;
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .auth-header h1 {
            font-size: 2.5rem;
            color: #2b9aff;
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid #2b3b4c;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #8e9eae;
            border-bottom: 2px solid transparent;
        }
        .auth-tab.active {
            color: #2b9aff;
            border-bottom-color: #2b9aff;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .auth-form.hidden {
            display: none;
        }
        .input-group {
            background: #1f2c38;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border: 1px solid #2b3b4c;
        }
        .input-group i {
            color: #6c7e8f;
            width: 24px;
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 14px 12px;
            color: #eef4ff;
            width: 100%;
            outline: none;
            font-size: 16px;
        }
        .btn {
            background: #2b9aff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 8px;
        }
        
        /* ========== ЧАТ (КАК В ТЕСТОВОМ ПРИМЕРЕ) ========== */
        .chat-header {
            padding: 12px 20px;
            background: #1f2c38;
            border-bottom: 1px solid #2b3b4c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 {
            color: white;
        }
        .select-user-btn {
            background: #2b9aff;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            background: #1f2c38;
            color: #eef4ff;
            align-self: flex-start;
            word-wrap: break-word;
            word-break: break-word;
        }
        .message.outgoing {
            background: #2b9aff;
            color: white;
            align-self: flex-end;
        }
        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }
        .message-meta {
            font-size: 10px;
            color: #8e9eae;
            margin-top: 4px;
            text-align: right;
        }
        .input-area {
            background: #1f2c38;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #2b3b4c;
        }
        .message-input {
            flex: 1;
            background: #17212b;
            border: none;
            padding: 10px 16px;
            border-radius: 24px;
            color: white;
            outline: none;
            font-size: 16px;
        }
        .send-btn {
            background: #2b9aff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        .empty-chat {
            text-align: center;
            color: #8e9eae;
            padding: 40px;
        }
        
        /* Модальное окно выбора пользователя */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #17212b;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h3 {
            color: white;
            margin-bottom: 16px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: none;
            margin-bottom: 16px;
            background: #1f2c38;
            color: white;
        }
        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .user-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #2b3b4c;
            color: white;
        }
        .user-item:hover {
            background: #1f2c38;
        }
        .close-modal {
            background: #2b9aff;
            border: none;
            padding: 8px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="app">
    <div id="authContainer" class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header"><h1>Telegrall</h1></div>
            <div class="auth-tabs"><div class="auth-tab active" data-tab="login">Вход</div><div class="auth-tab" data-tab="register">Регистрация</div></div>
            <div id="loginForm" class="auth-form">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Почта"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Пароль"></div>
                <button class="btn" id="doLoginBtn">Войти</button>
                <div id="loginError" class="error-msg"></div>
            </div>
            <div id="registerForm" class="auth-form hidden">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Почта"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Пароль"></div>
                <div class="input-group"><i class="fab fa-telegram"></i><input type="text" id="regUsername" placeholder="@username"></div>
                <div class="input-group"><i class="fas fa-user-circle"></i><input type="text" id="regDisplayName" placeholder="Отображаемое имя"></div>
                <button class="btn" id="doRegisterBtn">Создать</button>
                <div id="regError" class="error-msg"></div>
            </div>
        </div>
    </div>
    <div id="chatContainer" style="display:none"></div>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <h3>Выберите собеседника</h3>
        <input type="text" id="searchUserInput" placeholder="🔍 Поиск...">
        <div id="userList" class="user-list"></div>
        <button class="close-modal" id="closeModalBtn">Закрыть</button>
    </div>
</div>

<script>
const SB_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
const SB_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;
let currentChatId = null;
let allUsers = [];

function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function formatTime(d) { return new Date(d).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'}); }

async function loadCurrentUser() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return false;
    let { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
    if (!profile) {
        const username = user.email.split('@')[0];
        await sb.from('profiles').insert({ id: user.id, email: user.email, username, display_name: username });
        profile = { id: user.id, email: user.email, username, display_name: username };
    }
    currentUser = profile;
    return true;
}

async function loadUsers() {
    const { data } = await sb.from('profiles').select('*').neq('id', currentUser.id);
    allUsers = data || [];
    renderUserList(allUsers);
}

function renderUserList(users) {
    const container = document.getElementById('userList');
    if (!users.length) {
        container.innerHTML = '<div class="user-item">Нет пользователей</div>';
        return;
    }
    container.innerHTML = users.map(u => `
        <div class="user-item" data-id="${u.id}">
            ${escapeHtml(u.display_name || u.username)}
        </div>
    `).join('');
    document.querySelectorAll('.user-item[data-id]').forEach(el => {
        el.onclick = () => selectUser(el.dataset.id);
    });
}

function selectUser(userId) {
    currentChatId = userId;
    const user = allUsers.find(u => u.id === userId);
    document.getElementById('chatUserName').innerText = user?.display_name || user?.username;
    document.getElementById('userModal').style.display = 'none';
    document.getElementById('inputArea').style.display = 'flex';
    loadMessages();
}

async function loadMessages() {
    if (!currentChatId) return;
    const { data } = await sb.from('messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentChatId}),and(sender_id.eq.${currentChatId},receiver_id.eq.${currentUser.id})`).order('created_at');
    const div = document.getElementById('messagesContainer');
    if (!data || !data.length) { div.innerHTML = '<div class="empty-chat">Нет сообщений</div>'; return; }
    div.innerHTML = data.map(m => `<div class="message ${m.sender_id === currentUser.id ? 'outgoing' : 'incoming'}"><div class="message-text">${escapeHtml(m.content)}</div><div class="message-meta">${formatTime(m.created_at)}</div></div>`).join('');
    div.scrollTop = div.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || !currentChatId) return;
    await sb.from('messages').insert({ sender_id: currentUser.id, receiver_id: currentChatId, content: text });
    input.value = '';
    await loadMessages();
}

async function initChat() {
    document.getElementById('chatContainer').innerHTML = `
        <div class="chat-header">
            <h3 id="chatUserName">Чат</h3>
            <button class="select-user-btn" id="selectUserBtn">✉️ Новый чат</button>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-chat">Выберите собеседника</div>
        </div>
        <div class="input-area" id="inputArea" style="display:none">
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение...">
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    `;
    document.getElementById('selectUserBtn').onclick = () => {
        loadUsers();
        document.getElementById('userModal').style.display = 'flex';
    };
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('userModal').style.display = 'none';
    
    const searchInput = document.getElementById('searchUserInput');
    searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase();
        const filtered = allUsers.filter(u => (u.display_name || u.username).toLowerCase().includes(query));
        renderUserList(filtered);
    });
    
    await loadUsers();
}

async function register(email, pwd, user, name) {
    const { data: ex } = await sb.from('profiles').select('username').eq('username', user);
    if(ex?.length) throw new Error('Username занят');
    const { data, error } = await sb.auth.signUp({ email, password: pwd });
    if(error) throw error;
    await sb.from('profiles').insert({ id: data.user.id, email, username: user, display_name: name });
    return data;
}

async function login(email, pwd) {
    const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if(error) throw error;
}

document.getElementById('doLoginBtn').onclick = async () => {
    try { await login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); location.reload(); }
    catch(e) { document.getElementById('loginError').innerText = e.message; }
};
document.getElementById('doRegisterBtn').onclick = async () => {
    try {
        await register(document.getElementById('regEmail').value, document.getElementById('regPassword').value, document.getElementById('regUsername').value.replace('@',''), document.getElementById('regDisplayName').value);
        await login(document.getElementById('regEmail').value, document.getElementById('regPassword').value);
        location.reload();
    } catch(e) { document.getElementById('regError').innerText = e.message; }
};
document.querySelectorAll('.auth-tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('loginForm').classList.toggle('hidden', t.dataset.tab !== 'login');
        document.getElementById('registerForm').classList.toggle('hidden', t.dataset.tab !== 'register');
    };
});

window.onload = async () => {
    const { data: { session } } = await sb.auth.getSession();
    if(session && await loadCurrentUser()) {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('chatContainer').style.display = 'flex';
        await initChat();
    }
};
</script>
</body>
</html>
