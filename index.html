<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Telegrall — быстрый и безопасный мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0e1621;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 1400px;
            height: 100vh;
            background: #17212b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Аутентификация */
        .auth-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0e1621;
            padding: 16px;
        }
        .auth-card {
            background: #17212b;
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .auth-header h1 {
            font-size: 2.5rem;
            color: #2b9aff;
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid #2b3b4c;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #8e9eae;
            border-bottom: 2px solid transparent;
        }
        .auth-tab.active {
            color: #2b9aff;
            border-bottom-color: #2b9aff;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .auth-form.hidden {
            display: none;
        }
        .input-group {
            background: #1f2c38;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border: 1px solid #2b3b4c;
        }
        .input-group i {
            color: #6c7e8f;
            width: 24px;
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 14px 12px;
            color: #eef4ff;
            width: 100%;
            outline: none;
            font-size: 16px;
        }
        .btn {
            background: #2b9aff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 8px;
        }
        
        /* ========== ОСНОВНАЯ ВЁРСТКА ========== */
        .main-layout {
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        
        /* БОКОВАЯ ПАНЕЛЬ (диалоги) */
        .dialogs-panel {
            width: 320px;
            background: #17212b;
            border-right: 1px solid #2b3b4c;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .user-header {
            padding: 16px 20px;
            background: #1f2c38;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2b3b4c;
            flex-shrink: 0;
        }
        .user-header span {
            font-weight: 600;
            color: white;
        }
        .icon-btn {
            background: none;
            border: none;
            color: #9aaebf;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .search-box {
            padding: 12px 16px;
            background: #1f2c38;
            border-bottom: 1px solid #2b3b4c;
            flex-shrink: 0;
        }
        .search-box input {
            width: 100%;
            background: #17212b;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            color: white;
            outline: none;
        }
        .dialogs-list {
            flex: 1;
            overflow-y: auto;
        }
        .dialog-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #1e2a32;
        }
        .dialog-item:hover {
            background: #1f2c38;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: #2b9aff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            position: relative;
            flex-shrink: 0;
        }
        .online-dot {
            width: 12px;
            height: 12px;
            background: #4bcb6e;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid #17212b;
        }
        .dialog-name {
            font-weight: 600;
            color: #eef4ff;
        }
        
        /* ЧАТ — поле ввода ПРИБИТО К НИЗУ */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0e1621;
            overflow: hidden;
        }
        .chat-header {
            padding: 12px 20px;
            background: #1f2c38;
            border-bottom: 1px solid #2b3b4c;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #2b9aff;
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            background: #1f2c38;
            color: #eef4ff;
            align-self: flex-start;
            word-wrap: break-word;
            word-break: break-word;
        }
        .message.outgoing {
            background: #2b9aff;
            color: white;
            align-self: flex-end;
        }
        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }
        .message-meta {
            font-size: 10px;
            color: #8e9eae;
            margin-top: 4px;
            text-align: right;
        }
        .input-area {
            background: #1f2c38;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #2b3b4c;
            flex-shrink: 0;
        }
        .message-input {
            flex: 1;
            background: #17212b;
            border: none;
            padding: 10px 16px;
            border-radius: 24px;
            color: white;
            outline: none;
            font-size: 16px;
        }
        .send-btn {
            background: #2b9aff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        .empty-chat {
            text-align: center;
            color: #8e9eae;
            padding: 40px;
        }
        
        /* Адаптив для телефона */
        @media (max-width: 768px) {
            .dialogs-panel {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
                transform: translateX(0);
            }
            .dialogs-panel.hide-on-mobile {
                transform: translateX(-100%);
            }
            .chat-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                z-index: 20;
                transform: translateX(100%);
            }
            .chat-area.show-on-mobile {
                transform: translateX(0);
            }
            .back-btn {
                display: flex;
            }
            .message {
                max-width: 85%;
            }
            .avatar {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }
        
        @media (min-width: 769px) {
            .dialogs-panel {
                position: relative;
                transform: translateX(0) !important;
            }
            .chat-area {
                position: relative;
                transform: translateX(0) !important;
            }
            .back-btn {
                display: none !important;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div id="authContainer" class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header"><h1>Telegrall</h1></div>
            <div class="auth-tabs"><div class="auth-tab active" data-tab="login">Вход</div><div class="auth-tab" data-tab="register">Регистрация</div></div>
            <div id="loginForm" class="auth-form">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Почта"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Пароль"></div>
                <button class="btn" id="doLoginBtn">Войти</button>
                <div id="loginError" class="error-msg"></div>
            </div>
            <div id="registerForm" class="auth-form hidden">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Почта"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Пароль"></div>
                <div class="input-group"><i class="fab fa-telegram"></i><input type="text" id="regUsername" placeholder="@username"></div>
                <div class="input-group"><i class="fas fa-user-circle"></i><input type="text" id="regDisplayName" placeholder="Отображаемое имя"></div>
                <button class="btn" id="doRegisterBtn">Создать</button>
                <div id="regError" class="error-msg"></div>
            </div>
        </div>
    </div>
    <div id="chatContainer" style="display:none"></div>
</div>

<script>
const SB_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
const SB_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;
let currentChatId = null;
let allUsers = [];
let dialogsUsers = [];

function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function formatTime(d) { return new Date(d).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'}); }

async function loadCurrentUser() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return false;
    let { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
    if (!profile) {
        const username = user.email.split('@')[0];
        await sb.from('profiles').insert({ id: user.id, email: user.email, username, display_name: username });
        profile = { id: user.id, email: user.email, username, display_name: username };
    }
    currentUser = profile;
    return true;
}

async function loadDialogs() {
    const { data: messages } = await sb.from('messages').select('sender_id, receiver_id').or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);
    const userIds = new Set();
    messages?.forEach(m => {
        if (m.sender_id === currentUser.id) userIds.add(m.receiver_id);
        if (m.receiver_id === currentUser.id) userIds.add(m.sender_id);
    });
    if (userIds.size === 0) {
        dialogsUsers = [];
        const div = document.getElementById('usersList');
        if (div) div.innerHTML = '<div class="empty-chat">💬 У вас пока нет чатов. Начните общение через поиск</div>';
        return;
    }
    const { data: users } = await sb.from('profiles').select('*').in('id', Array.from(userIds));
    dialogsUsers = users || [];
    renderDialogsList();
}

function renderDialogsList() {
    const div = document.getElementById('usersList');
    if (!div) return;
    if (dialogsUsers.length === 0) {
        div.innerHTML = '<div class="empty-chat">💬 У вас пока нет чатов. Начните общение через поиск</div>';
        return;
    }
    div.innerHTML = dialogsUsers.map(u => `<div class="dialog-item" data-id="${u.id}"><div class="avatar">${(u.display_name||u.username)[0]}<span class="online-dot"></span></div><div class="dialog-name">${escapeHtml(u.display_name||u.username)}</div></div>`).join('');
    document.querySelectorAll('.dialog-item').forEach(el => { el.onclick = () => openUserChat(el.dataset.id); });
}

async function searchUsers(query) {
    if (!query.trim()) {
        document.getElementById('searchResults').classList.remove('show');
        return;
    }
    const { data } = await sb.from('profiles')
        .select('*')
        .neq('id', currentUser.id)
        .or(`display_name.ilike.%${query}%,username.ilike.%${query}%`);
    const resultsDiv = document.getElementById('searchResults');
    if (!data || data.length === 0) {
        resultsDiv.innerHTML = '<div class="search-result-item">Ничего не найдено</div>';
        resultsDiv.classList.add('show');
        return;
    }
    resultsDiv.innerHTML = data.map(u => `<div class="search-result-item" data-id="${u.id}"><div class="avatar" style="width:32px;height:32px;font-size:0.8rem">${(u.display_name||u.username)[0]}</div><div>${escapeHtml(u.display_name||u.username)}<br><span style="font-size:11px;color:#8e9eae">@${escapeHtml(u.username)}</span></div></div>`).join('');
    resultsDiv.classList.add('show');
    document.querySelectorAll('.search-result-item[data-id]').forEach(el => {
        el.onclick = () => {
            const userId = el.dataset.id;
            const user = data.find(u => u.id === userId);
            openUserChat(userId, true);
            document.getElementById('searchInput').value = '';
            resultsDiv.classList.remove('show');
        };
    });
}

async function openUserChat(id, isNew = false) {
    currentChatId = id;
    const user = dialogsUsers.find(u => u.id === id) || allUsers.find(u => u.id === id);
    document.getElementById('chatUserName').innerText = user?.display_name || user?.username;
    document.getElementById('chatAvatar').innerText = (user?.display_name||user?.username)[0];
    document.getElementById('inputArea').style.display = 'flex';
    await loadMessages();
    if (window.innerWidth <= 768) {
        document.getElementById('dialogsPanel').classList.add('hide-on-mobile');
        document.getElementById('chatAreaPanel').classList.add('show-on-mobile');
    }
    if (isNew) await loadDialogs();
}

function goBackToDialogs() {
    if (window.innerWidth <= 768) {
        document.getElementById('dialogsPanel').classList.remove('hide-on-mobile');
        document.getElementById('chatAreaPanel').classList.remove('show-on-mobile');
    }
    currentChatId = null;
}

async function loadMessages() {
    if (!currentChatId) return;
    const { data } = await sb.from('messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentChatId}),and(sender_id.eq.${currentChatId},receiver_id.eq.${currentUser.id})`).order('created_at');
    const div = document.getElementById('messagesContainer');
    if (!data || !data.length) { div.innerHTML = '<div class="empty-chat">Нет сообщений</div>'; return; }
    div.innerHTML = data.map(m => `<div class="message ${m.sender_id === currentUser.id ? 'outgoing' : 'incoming'}"><div class="message-text">${escapeHtml(m.content)}</div><div class="message-meta">${formatTime(m.created_at)}</div></div>`).join('');
    div.scrollTop = div.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || !currentChatId) return;
    await sb.from('messages').insert({ sender_id: currentUser.id, receiver_id: currentChatId, content: text });
    input.value = '';
    await loadMessages();
    await loadDialogs();
}

async function initChat() {
    document.getElementById('chatContainer').innerHTML = `
        <div class="main-layout">
            <div class="dialogs-panel" id="dialogsPanel">
                <div class="user-header">
                    <span><i class="fas fa-user-circle"></i> <span id="myUserName"></span></span>
                    <button class="icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск...">
                    <div id="searchResults" class="search-results" style="background:#1f2c38; border-radius:12px; margin-top:8px; display:none;"></div>
                </div>
                <div class="dialogs-list" id="usersList"></div>
            </div>
            <div class="chat-area" id="chatAreaPanel">
                <div class="chat-header">
                    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="chat-header-left">
                        <div class="avatar" id="chatAvatar">?</div>
                        <h3 id="chatUserName"></h3>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer"><div class="empty-chat">Выберите чат</div></div>
                <div class="input-area" id="inputArea" style="display:none">
                    <input type="text" class="message-input" id="messageInput" placeholder="Сообщение...">
                    <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    `;
    document.getElementById('myUserName').innerText = currentUser.display_name || currentUser.username;
    document.getElementById('logoutBtn').onclick = async () => { await sb.auth.signOut(); location.reload(); };
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    document.getElementById('backBtn').addEventListener('click', goBackToDialogs);
    
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    let searchTimeout;
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => searchUsers(searchInput.value), 300);
    });
    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target)) searchResults.classList.remove('show');
    });
    
    await loadDialogs();
}

async function register(email, pwd, user, name) {
    const { data: ex } = await sb.from('profiles').select('username').eq('username', user);
    if(ex?.length) throw new Error('Username занят');
    const { data, error } = await sb.auth.signUp({ email, password: pwd });
    if(error) throw error;
    await sb.from('profiles').insert({ id: data.user.id, email, username: user, display_name: name });
    return data;
}

async function login(email, pwd) {
    const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if(error) throw error;
}

document.getElementById('doLoginBtn').onclick = async () => {
    try { await login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); location.reload(); }
    catch(e) { document.getElementById('loginError').innerText = e.message; }
};
document.getElementById('doRegisterBtn').onclick = async () => {
    try {
        await register(document.getElementById('regEmail').value, document.getElementById('regPassword').value, document.getElementById('regUsername').value.replace('@',''), document.getElementById('regDisplayName').value);
        await login(document.getElementById('regEmail').value, document.getElementById('regPassword').value);
        location.reload();
    } catch(e) { document.getElementById('regError').innerText = e.message; }
};
document.querySelectorAll('.auth-tab').forEach(t => {
    t.onclick = () => {
        document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('loginForm').classList.toggle('hidden', t.dataset.tab !== 'login');
        document.getElementById('registerForm').classList.toggle('hidden', t.dataset.tab !== 'register');
    };
});

window.onload = async () => {
    const { data: { session } } = await sb.auth.getSession();
    if(session && await loadCurrentUser()) {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('chatContainer').style.display = 'flex';
        await initChat();
    }
};
</script>
</body>
</html>
